# Render blueprint for the Django backend.
# This repo also contains the frontend, so the backend service uses rootDir.
# You can deploy manually in the Render dashboard with the same commands.

services:
  - type: web
    name: propertyflow-backend
    env: python
    rootDir: propertyflow_backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: propertyflow-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-vercel-url.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-vercel-url.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: propertyflow-postgres
          property: connectionString

databases:
  - name: propertyflow-postgres
    databaseName: propertyflow_db
    user: propertyflow_user
